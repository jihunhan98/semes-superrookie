<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif" role="img">
<title>고객 요구사항 자동화 시스템 아키텍처</title>
<desc>사내 폐쇄망 안에서 React 프론트엔드가 Spring Boot 백엔드에 연결되고, 백엔드는 Oracle DB, Python AI 추론 서버, Bitbucket과 연동되며, AI 추론 서버는 워크스테이션의 Hugging Face 로컬 모델을 호출하는 구조를 보여주는 구조도</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="480" fill="#FFFFFF"/>

<rect x="40" y="20" width="600" height="440" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 4"/>
<text x="340" y="48" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">사내 폐쇄망 (에어갭 환경)</text>
<text x="340" y="64" text-anchor="middle" font-size="12" fill="#5F5E5A">외부 인터넷·AI API 사용 불가</text>

<line x1="350" y1="136" x2="340" y2="170" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="270" y1="226" x2="155" y2="280" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="226" x2="350" y2="280" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="410" y1="226" x2="535" y2="280" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="350" y1="336" x2="350" y2="376" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="250" y="80" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="350" y="98" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">React (Next.js)</text>
<text x="350" y="116" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">웹 대시보드</text>
</g>

<g>
<rect x="230" y="170" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="188" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Spring Boot 백엔드</text>
<text x="340" y="206" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">도메인 로직 관리</text>
</g>

<g>
<rect x="70" y="280" width="170" height="56" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="155" y="298" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#72243E">Oracle DB</text>
<text x="155" y="316" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993556">전체 데이터 저장</text>
</g>

<g>
<rect x="260" y="280" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="350" y="298" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">AI 추론 서버</text>
<text x="350" y="316" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">문서 분석 API</text>
</g>

<g>
<rect x="460" y="280" width="150" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="535" y="298" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Bitbucket</text>
<text x="535" y="316" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">커밋 폴링</text>
</g>

<g>
<rect x="240" y="376" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="350" y="394" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">워크스테이션</text>
<text x="350" y="412" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Hugging Face 모델 서빙</text>
